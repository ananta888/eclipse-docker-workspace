services:
  eclipse:
    build:
      context: .
      dockerfile: docker/eclipse/Dockerfile
    image: eclipse-classic:${ECLIPSE_IMAGE_TAG:-latest}
    container_name: eclipse-classic
    shm_size: 2g
    user: "0:0"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      NOVNC_PORT: ${NOVNC_PORT:-6080}
      VNC_PORT: ${VNC_PORT:-5900}
      USE_HOST_X11: ${USE_HOST_X11:-0}
      HOST_DISPLAY: ${HOST_DISPLAY:-host.docker.internal:0.0}
      DISPLAY: ${DISPLAY:-}
      ECLIPSE_WORKSPACE: /workspace
      ECLIPSE_SHARED: /shared
      ECLIPSE_BACKUP: /backup
      DISABLE_SAROS: ${DISABLE_SAROS:-1}
    ports:
      - "${NOVNC_PORT:-6080}:6080"
    volumes:
      - ${REPOS_DIR:-./repos}:/repos
      - ${WORKSPACE_DIR:-./portable/workspace}:/workspace
      - ${ECLIPSE_HOME_DIR:-./eclipse-data/home}:/home/developer
      - ${SHARED_DIR:-./shared}:/shared
      - ${BACKUP_DIR:-./backup}:/backup
    restart: unless-stopped

  vscode:
    image: gitpod/openvscode-server:${OPENVSCODE_IMAGE_TAG:-latest}
    container_name: openvscode-server
    profiles:
      - vscode
    environment:
      TZ: ${TZ:-Europe/Berlin}
    ports:
      - "${OPENVSCODE_PORT:-3000}:3000"
    volumes:
      - ${REPOS_DIR:-./repos}:/repos
      - ${WORKSPACE_DIR:-./portable/workspace}:/workspace
      - ${SHARED_DIR:-./shared}:/shared
      - ${VSCODE_HOME_DIR:-./vscode-data/home}:/home/openvscode-server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --without-connection-token
      - --workspace-folder
      - /workspace
    restart: unless-stopped
